<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Companion System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Decision Companion System</h1>
            <p class="subtitle">Make better decisions with data-driven analysis</p>
        </header>

        <!-- Step 1: Setup -->
        <div id="step-setup" class="step active">
            <h2>Step 1: Setup Your Decision</h2>
            <div class="form-group">
                <label for="num-products">Number of Products:</label>
                <input type="number" id="num-products" min="2" value="3" required>
                <span class="hint">At least 2 Products to compare</span>
            </div>
            <div class="form-group">
                <label for="num-features">Number of Criteria:</label>
                <input type="number" id="num-features" min="1" value="2" required>
                <span class="hint">At least 1 criterion</span>
            </div>
            <button onclick="startSetup()" class="btn-primary">Next Step →</button>
        </div>

        <!-- Step 2: Features and Weights -->
        <div id="step-features" class="step">
            <h2>Step 2: Define Your Criteria</h2>
            <div id="features-container"></div>
            <button onclick="goToProducts()" class="btn-primary">Next Step →</button>
            <button onclick="goBack('step-setup')" class="btn-secondary">← Back</button>
        </div>

        <!-- Step 3: Product Data -->
        <div id="step-products" class="step">
            <h2>Step 3: Enter Option Details</h2>
            <div id="products-container"></div>
            <button onclick="goToIdeals()" class="btn-primary">Next Step →</button>
            <button onclick="goBack('step-features')" class="btn-secondary">← Back</button>
        </div>

        <!-- Step 4: Ideal Values -->
        <div id="step-ideals" class="step">
            <h2>Step 4: Define Your Ideal Values</h2>
            <div id="ideals-container"></div>
            <button onclick="calculateResult()" class="btn-primary">Calculate Decision 🚀</button>
            <button onclick="goBack('step-products')" class="btn-secondary">← Back</button>
        </div>

        <!-- Step 5: Results -->
        <div id="step-results" class="step">
            <h2>🏆 Your Decision Results</h2>
            <div id="results-container"></div>
            <button onclick="resetForm()" class="btn-primary">Start New Decision</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
